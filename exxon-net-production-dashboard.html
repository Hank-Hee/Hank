<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ExxonMobil 按 Region 展示的净产量分析看板">
  <title>ExxonMobil 地区净产量</title>
  <script src="assets/echarts.min.js"></script>
  <style>
    :root {
      --canvas: #f5f7fa;
      --surface: #ffffff;
      --surface-soft: #fafbfd;
      --line: #dce3ec;
      --line-strong: #c8d3df;
      --ink: #102a43;
      --muted: #65778c;
      --muted-light: #8696a8;
      --blue: #2f6fae;
      --blue-hover: #245e95;
      --blue-soft: #e8f0fa;
      --shadow: 0 8px 22px rgba(27, 56, 88, .07);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--canvas);
      font-family: Inter, Arial, "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; }

    .dashboard {
      display: flex;
      width: 100%;
      height: 100vh;
      min-height: 0;
      margin: 0;
      padding: 0;
    }

    .chart-card {
      position: relative;
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 0;
      box-shadow: none;
    }

    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex: none;
      padding: 16px 18px 12px;
      border-bottom: 1px solid #edf1f5;
    }

    .chart-head h1 { margin: 0; color: #143451; font-size: 21px; font-weight: 730; letter-spacing: -.25px; }
    .chart-head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }

    .export-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      color: #285f95;
      background: #f4f8fc;
      border: 1px solid #cbd9e7;
      border-radius: 5px;
      cursor: pointer;
    }

    .export-button:hover { color: #1e5589; background: #e8f1fa; border-color: #a8c2db; }
    .export-button svg { width: 18px; height: 18px; }

    .chart-stage {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      padding: 0 3px 0 0;
    }

    #production-chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .chart-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: rgba(255,255,255,.88);
      font-size: 13px;
    }

    .chart-loading[hidden] { display: none; }

    .legend-zone {
      display: flex;
      flex: none;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 12px 10px;
      border-top: 1px solid #eef2f5;
      background: #fcfdfe;
    }

    .legend-label {
      flex: none;
      padding-top: 4px;
      color: #617487;
      font-size: 12px;
      font-weight: 680;
    }

    .region-legend {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      gap: 7px 14px;
      min-width: 0;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      color: #425b73;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
      text-align: left;
    }

    .legend-item:hover { color: #123f68; }
    .legend-item.is-muted { color: #9aa8b6; text-decoration: line-through; }
    .legend-swatch { width: 11px; height: 11px; flex: none; border-radius: 1px; }

    @media (max-width: 720px) {
      html, body { overflow: auto; }
      .dashboard { height: auto; min-height: 100vh; }
      .chart-head { padding: 14px 12px 10px; }
      .chart-head h1 { font-size: 19px; }
      .chart-stage { flex: none; height: 420px; }
      .legend-zone { align-items: flex-start; flex-direction: column; gap: 7px; padding: 9px 12px 10px; }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="chart-card" aria-labelledby="page-title">
      <header class="chart-head">
        <div>
          <h1 id="page-title">ExxonMobil 地区净产量</h1>
          <p>Net production · Unit: kbbl/d</p>
        </div>
        <button id="export-button" class="export-button" type="button" aria-label="下载 Excel 源数据" title="下载 Excel 源数据">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 14v5h14v-5"/></svg>
        </button>
      </header>

      <div class="chart-stage">
        <div id="production-chart" role="img" aria-label="按地区展示 ExxonMobil 净产量"></div>
        <div id="chart-loading" class="chart-loading">正在加载生产数据…</div>
      </div>

      <div class="legend-zone">
        <span class="legend-label">Region</span>
        <div id="region-legend" class="region-legend" aria-label="地区图例；点击可显示或隐藏地区"></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const palette = {
        "Australasia": "#8d73a8",
        "East Asia": "#c77770",
        "South East Asia": "#c99a89",
        "Middle East": "#d0b546",
        "North Africa": "#afbf63",
        "East Africa": "#d0cf70",
        "South Africa": "#c5cf91",
        "West Africa": "#d8d1a0",
        "South America": "#8eb34b",
        "North America": "#286e70",
        "Western Europe": "#527d91",
        "Southern Europe": "#7f9eae",
        "Russia": "#63aeb5",
        "Central Asia": "#d5a2a1",
        "Melanesia, Micronesia & Polynesia": "#9781ae"
      };

      const chartElement = document.getElementById("production-chart");
      const loadingElement = document.getElementById("chart-loading");
      const legendElement = document.getElementById("region-legend");
      const exportButton = document.getElementById("export-button");
      let chart;
      let dashboardData;
      const selected = new Set();

      const formatNumber = (value, digits = 1) => new Intl.NumberFormat("en-US", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      }).format(value);

      const downloadSourceWorkbook = () => {
        const anchor = document.createElement("a");
        anchor.href = "data/exxonmobil-net-production-source.xlsx?v=20260720";
        anchor.download = "美孚产量.xlsx";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      };

      const renderLegend = (regions) => {
        legendElement.replaceChildren();
        regions.forEach((region) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "legend-item";
          item.dataset.region = region;
          item.innerHTML = `<span class="legend-swatch" style="background:${palette[region] || '#8fa0b4'}"></span><span>${region}</span>`;
          item.addEventListener("click", () => {
            if (selected.has(region)) selected.delete(region); else selected.add(region);
            item.classList.toggle("is-muted", !selected.has(region));
            chart.dispatchAction({ type: "legendToggleSelect", name: region });
          });
          legendElement.appendChild(item);
        });
      };

      const chartOption = (data) => {
        const years = data.data.map(item => item.year);
        return {
          animationDuration: 520,
          animationEasing: "cubicOut",
          color: data.regions.map(region => palette[region] || "#8fa0b4"),
          grid: { left: 54, right: 24, top: 36, bottom: 52, containLabel: false },
          tooltip: {
            trigger: "axis",
            axisPointer: { type: "line", lineStyle: { color: "#8497a9", width: 1, type: "dashed" } },
            position(point, params, dom, rect, size) {
              const [viewWidth, viewHeight] = size.viewSize;
              const [contentWidth, contentHeight] = size.contentSize;
              const left = point[0] > viewWidth * .62
                ? Math.max(16, point[0] - contentWidth - 18)
                : Math.min(viewWidth - contentWidth - 16, point[0] + 18);
              const top = Math.min(Math.max(16, point[1] - contentHeight / 2), viewHeight - contentHeight - 16);
              return [left, top];
            },
            backgroundColor: "rgba(255,255,255,.98)",
            borderColor: "#cad6e2",
            borderWidth: 1,
            padding: 0,
            textStyle: { color: "#1f3a54", fontSize: 12 },
            extraCssText: "min-width:300px; padding:0 10px; box-shadow:0 10px 28px rgba(20,48,75,.14); border-radius:6px; overflow:hidden;",
            formatter(params) {
              const row = data.data[params[0].dataIndex];
              const active = params
                .filter(item => selected.has(item.seriesName) && item.value > 0)
                .sort((a, b) => b.value - a.value)
                .map(item => `<tr><td style=\"padding:3px 16px 3px 0;color:#4e6377;white-space:nowrap\"><span style=\"display:inline-block;width:8px;height:8px;border-radius:1px;background:${item.color};margin-right:6px\"></span>${item.seriesName}</td><td style=\"padding:3px 0;text-align:right;color:#173752;font-weight:650\">${formatNumber(item.value)}</td></tr>`)
                .join("");
              return `<div style=\"min-width:226px\"><div style=\"padding:10px 12px 8px;border-bottom:1px solid #e8edf2;font-weight:730;color:#143653\">Year ${row.year}</div><table style=\"width:100%;border-collapse:collapse;padding:8px 12px\"><tbody>${active || '<tr><td style=\"padding:9px 0;color:#7b8b9c\">No region selected</td></tr>'}</tbody></table><div style=\"display:flex;justify-content:space-between;gap:16px;padding:8px 12px;background:#f5f8fb;border-top:1px solid #e8edf2;color:#4a6076\"><span>Total Production</span><strong style=\"color:#153955\">${formatNumber(row.total)} kbbl/d</strong></div></div>`;
            }
          },
          legend: { show: false },
          xAxis: {
            type: "category",
            boundaryGap: false,
            data: years,
            axisLine: { lineStyle: { color: "#bdcad7" } },
            axisTick: { show: false },
            axisLabel: { color: "#52687d", fontSize: 10, interval: 0, margin: 19 }
          },
          yAxis: {
            type: "value",
            name: "Production (kbbl/d)",
            nameLocation: "end",
            nameGap: 17,
            nameTextStyle: { color: "#607386", fontSize: 12, fontWeight: 600, align: "left" },
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: { color: "#52687d", fontSize: 11, formatter: value => new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(value) },
            splitLine: { show: true, lineStyle: { color: "#e4e9ef", width: 1 } }
          },
          series: data.regions.map((region) => ({
            name: region,
            type: "line",
            stack: "production",
            smooth: 0.13,
            showSymbol: false,
            symbol: "circle",
            symbolSize: 5,
            lineStyle: { width: 1.1, color: palette[region] },
            areaStyle: { color: palette[region], opacity: .88 },
            emphasis: { focus: "series", lineStyle: { width: 1.7 }, areaStyle: { opacity: 1 } },
            data: data.data.map(item => item.values[region])
          }))
        };
      };

      const renderChart = (data) => {
        dashboardData = data;
        selected.clear();
        data.regions.forEach(region => selected.add(region));
        if (chart) chart.dispose();
        chart = echarts.init(chartElement, null, { renderer: "canvas" });
        chart.setOption(chartOption(data));
        renderLegend(data.regions);
        loadingElement.hidden = true;
      };

      exportButton.addEventListener("click", downloadSourceWorkbook);

      window.addEventListener("resize", () => chart && chart.resize());

      fetch("data/exxon-net-production-by-region.json?v=20260720-3")
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then(renderChart)
        .catch(error => {
          loadingElement.textContent = `生产数据加载失败：${error.message}`;
          loadingElement.style.color = "#a33d3d";
          console.error(error);
        });
    })();
  </script>
</body>
</html>
