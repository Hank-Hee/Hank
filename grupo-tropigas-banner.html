<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grupo Tropigas 公司画像横幅</title>
  <style>
    :root {
      --brand-950: #10283d;
      --brand-900: #17324d;
      --brand-800: #1d405f;
      --brand-100: #eaf1f5;
      --banner-text: #ffffff;
      --banner-subtext: #c6d2dd;
      --banner-tag-text: #e9f0f5;
      --border: #d9e1e8;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --focus-ring: rgba(213, 180, 106, 0.42);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      margin: 0;
      background: transparent;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    .banner-frame { width: 100%; }

    .company-banner {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr) auto;
      gap: 24px;
      align-items: center;
      width: 100%;
      min-height: 220px;
      padding: 32px 36px;
      overflow: hidden;
      color: var(--banner-text);
      background: var(--brand-900);
      border: 0;
      border-radius: var(--radius-lg);
    }

    .company-logo-shell {
      display: grid;
      width: 92px;
      height: 92px;
      padding: 10px;
      place-items: center;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #d4e0e8;
      border-radius: var(--radius-md);
    }

    .company-logo {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .company-logo[hidden],
    .logo-fallback[hidden] { display: none; }

    .logo-fallback {
      color: var(--brand-900);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
    }

    .company-identity { min-width: 0; }

    .company-name-en {
      margin: 0 0 4px;
      overflow-wrap: anywhere;
      color: #ffffff;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .company-name-cn {
      margin: 0 0 16px;
      color: var(--banner-subtext);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
    }

    .company-name-cn:empty { display: none; }

    .company-facts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
      min-width: 0;
      max-width: 100%;
    }

    .company-facts span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 12px;
      color: var(--banner-tag-text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: var(--radius-sm);
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
    }

    .company-banner-action {
      align-self: end;
      justify-self: end;
    }

    .official-site-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 64px;
      color: var(--brand-900);
      background: #ffffff;
      border: 1px solid #ffffff;
      border-radius: var(--radius-sm);
      box-shadow: 0 1px 2px rgba(16, 40, 61, 0.12);
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .official-site-link:hover {
      color: var(--brand-950);
      background: var(--brand-100);
      border-color: var(--brand-100);
      box-shadow: 0 4px 12px rgba(16, 40, 61, 0.18);
      transform: translateY(-1px);
    }

    .official-site-link:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }

    .official-site-link:active { transform: translateY(0); }

    @media (max-width: 900px) {
      .company-banner {
        grid-template-columns: 80px minmax(0, 1fr) auto;
        gap: 18px;
        min-height: 205px;
        padding: 28px;
      }

      .company-logo-shell {
        width: 76px;
        height: 76px;
      }

      .company-name-en { font-size: 30px; }
    }

    @media (max-width: 760px) {
      .company-banner {
        grid-template-columns: 68px minmax(0, 1fr);
        gap: 16px;
        min-height: 190px;
        padding: 24px;
      }

      .company-logo-shell {
        width: 64px;
        height: 64px;
        padding: 8px;
      }

      .company-name-en { font-size: 26px; }

      .company-name-cn {
        margin-bottom: 14px;
        font-size: 14px;
      }

      .company-facts {
        display: grid;
        grid-template-columns: repeat(2, max-content);
        justify-content: start;
        gap: 8px;
      }

      .company-facts span {
        min-height: 30px;
        padding: 5px 10px;
        font-size: 13px;
      }

      .company-banner-action {
        grid-column: 1 / -1;
        justify-self: start;
        margin-top: 2px;
      }

      .official-site-link {
        min-height: 36px;
        padding-right: 32px;
        padding-left: 32px;
      }
    }
  </style>
</head>
<body>
  <main class="banner-frame" aria-label="Grupo Tropigas 公司画像横幅">
    <header class="company-banner">
      <div class="company-logo-shell" aria-label="Grupo Tropigas logo">
        <img class="company-logo" id="company-logo" alt="">
        <span class="logo-fallback" id="logo-fallback" hidden aria-hidden="true"></span>
      </div>
      <div class="company-identity">
        <h1 class="company-name-en" id="company-name-en"></h1>
        <p class="company-name-cn" id="company-name-cn"></p>
        <div class="company-facts" id="company-facts" aria-label="公司属性"></div>
      </div>
      <div class="company-banner-action" id="company-banner-action"></div>
    </header>
  </main>

  <script id="company-data" type="application/json">
      {
      "id": "6a1e90aa11f1cb641ce4fe76",
      "nameEn": "Grupo Tropigas",
      "nameCn": "特罗皮加斯集团",
      "logoUrl": "assets/banner-logos/grupo-tropigas-logo.svg",
      "type": "资源型",
      "country": "洪都拉斯",
      "businessTags": [
            "LPG分销",
            "燃气终端"
      ],
      "officialWebsite": "https://www.grupotropigas.com/"
}
  </script>
  <script>
    (() => {
      const company = JSON.parse(document.getElementById("company-data").textContent);
      const logo = document.getElementById("company-logo");
      const fallback = document.getElementById("logo-fallback");
      const nameEn = document.getElementById("company-name-en");
      const nameCn = document.getElementById("company-name-cn");
      const facts = document.getElementById("company-facts");
      const action = document.getElementById("company-banner-action");

      function normalizeExternalUrl(value) {
        if (!value || typeof value !== "string") return null;
        const raw = value.trim();
        if (!raw) return null;
        const candidate = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
        try {
          const url = new URL(candidate);
          return ["http:", "https:"].includes(url.protocol) ? url.href : null;
        } catch {
          return null;
        }
      }

      function initials(value) {
        const compact = String(value || "").replace(/[^A-Za-z0-9]/g, "");
        if (compact && compact === compact.toUpperCase() && compact.length <= 5) return compact;
        const words = String(value || "").match(/[A-Z][a-z]*/g) || String(value || "").split(/\s+/);
        return words.map((word) => word.charAt(0)).join("").slice(0, 4).toUpperCase() || "?";
      }

      function showLogoFallback() {
        logo.hidden = true;
        fallback.hidden = false;
      }

      function addFact(value) {
        const text = String(value || "").trim();
        if (!text) return;
        const tag = document.createElement("span");
        tag.textContent = text;
        facts.append(tag);
      }

      nameEn.textContent = company.nameEn || "";
      nameCn.textContent = company.nameCn || "";
      fallback.textContent = initials(company.nameEn);
      [company.type, company.country, ...(Array.isArray(company.businessTags) ? company.businessTags : [])].forEach(addFact);

      if (company.logoUrl) {
        logo.src = company.logoUrl;
        logo.alt = `${company.nameEn || "Company"} logo`;
        logo.addEventListener("error", showLogoFallback, { once: true });
      } else {
        showLogoFallback();
      }

      const website = normalizeExternalUrl(company.officialWebsite);
      if (website) {
        const link = document.createElement("a");
        link.className = "official-site-link";
        link.href = website;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.setAttribute("aria-label", `访问 ${company.nameEn} 官方网站（在新标签页打开）`);

        const label = document.createElement("span");
        label.textContent = "访问官网";
        link.append(label);
        action.append(link);
      }
    })();
  </script>
</body>
</html>
