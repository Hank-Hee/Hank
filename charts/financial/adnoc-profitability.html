<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>ADNOC 财务看板 - 收入与净利润</title>
    <link rel="stylesheet" href="adnoc-financials.css?v=20260721-all-ui-v1" />
  </head>
  <body data-company="adnoc" data-dashboard="profitability">
    <main class="dashboard-module">
      <section class="chart-card" aria-labelledby="chart-title">
        <header class="chart-header">
          <div class="title-block">
            <p class="eyebrow" data-eyebrow>FINANCIAL PROFILE · 2026</p>
            <h1 id="chart-title" data-title-cn>ADNOC 收入与净利润</h1>
            <p class="unit" data-subtitle>USD million</p>
          </div>
        </header>
        <div class="legend" aria-label="Legend">
          <button type="button" class="legend-item" data-series="bar" aria-pressed="true"><i class="dot bar" aria-hidden="true"></i><span data-bar-label>Revenue</span></button>
          <button type="button" class="legend-item" data-series="line" aria-pressed="true"><i class="dot line" aria-hidden="true"></i><span data-line-label>Net Income</span></button>
          <button type="button" class="legend-item" data-series="forecast" aria-pressed="true"><i class="dot forecast" aria-hidden="true"></i><span>Forecast</span></button>
        </div>
        <div class="chart-stage">
          <div id="financial-chart" class="chart"></div>
        </div>
        <footer class="chart-footer">
          <span class="source-note" data-source-line>Source: 2025 IR · Q4 Results · Q1 2026</span>
          <span class="update-date" data-update-date>Update date: 2026/07/09</span>
        </footer>
        <div id="state" class="state">正在加载财务数据</div>
      </section>
    </main>
    <script type="module" src="adnoc-financials.js?v=20260721-all-ui-v1"></script>
  </body>
</html>
