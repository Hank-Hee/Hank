<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>ADNOC 财务看板 - 现金流与投资</title>
    <link rel="stylesheet" href="adnoc-financials.css?v=20260709-adnoc" />
  </head>
  <body data-dashboard="cash-investment">
    <main class="financial-card" aria-labelledby="chart-title">
      <header class="chart-header">
        <div class="header-mark" aria-hidden="true"></div>
        <div class="title-block">
          <h1 id="chart-title">ADNOC 现金与投资 | Cash flow & Cash on hand</h1>
          <p>Operating CF + Free CF proxy + cash balance; capex is not disclosed for this proxy</p>
        </div>
      </header>

      <section class="kpi-strip" aria-label="关键指标">
        <div class="kpi"><small>2025 Operating CF</small><strong data-kpi="ocf">...</strong></div>
        <div class="kpi"><small>2025 Cash on hand</small><strong data-kpi="cash">...</strong></div>
        <div class="kpi"><small>Capex</small><strong data-kpi="capex">...</strong></div>
      </section>

      <section class="chart-stage">
        <div id="financial-chart" class="chart" role="img" aria-label="ADNOC cash flow and cash on hand chart"></div>
      </section>

      <footer class="footnote">
        <span>Free CF proxy = operating CF + investing CF; Murban proxy does not bear production capex.</span>
        <a class="source-link" data-source-link href="#" target="_blank" rel="noreferrer">Source</a>
      </footer>
      <div id="state" class="state">正在加载财务数据</div>
    </main>

    <script src="../../assets/echarts.min.js?v=20260709-adnoc-svgcash4"></script>
    <script type="module" src="adnoc-financials.js?v=20260709-adnoc-svgcash4"></script>
