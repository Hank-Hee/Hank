<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>TotalEnergies Financial Dashboard - Revenue and Net Income</title>
    <link rel="stylesheet" href="adnoc-financials.css?v=20260721-totalenergies-v1" />
  </head>
  <body data-company="totalenergies" data-dashboard="profitability">
    <main class="dashboard-module">
      <section class="chart-card" aria-labelledby="chart-title">
        <header class="chart-header">
          <div class="title-block">
            <p class="eyebrow" data-eyebrow>FINANCIAL PROFILE &middot; 2026</p>
            <h1 id="chart-title" data-title-cn>TotalEnergies 收入与净利润</h1>
            <p class="unit" data-subtitle>USD million</p>
          </div>
          <div class="chart-actions" aria-label="Chart actions">
            <button type="button" data-action="download" aria-label="Download chart" title="Download chart">&#8595;</button>
            <button type="button" data-action="refresh" aria-label="Refresh chart" title="Refresh chart">&#8635;</button>
            <button type="button" data-action="fullscreen" aria-label="Fullscreen chart" title="Fullscreen chart">&#9974;</button>
          </div>
        </header>
        <div class="legend" aria-label="Legend">
          <button type="button" class="legend-item" data-series="bar" aria-pressed="true"><i class="dot bar" aria-hidden="true"></i><span data-bar-label>Revenue</span></button>
          <button type="button" class="legend-item" data-series="line" aria-pressed="true"><i class="dot line" aria-hidden="true"></i><span data-line-label>Net Income</span></button>
          <button type="button" class="legend-item" data-series="forecast" aria-pressed="true"><i class="dot forecast" aria-hidden="true"></i><span>Forecast</span></button>
        </div>
        <div class="chart-stage"><div id="financial-chart" class="chart"></div></div>
        <footer class="chart-footer">
          <span class="source-note" data-source-line>Source: FY2025 Universal Registration Document，FY2025 Results，FY2026-27 Analyst Consensus</span>
          <span class="update-date" data-update-date>Update date: 2026/07/21</span>
        </footer>
        <div id="state" class="state">Loading financial data</div>
      </section>
    </main>
    <script type="module" src="totalenergies-financials.js?v=20260721-totalenergies-v1"></script>
  </body>
</html>
