<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="公司项目类型结构圆环图" />
    <title>项目类型结构</title>
    <link rel="stylesheet" href="styles.css?v=20260721-ui-v2-production" />
  </head>
  <body>
    <main class="dashboard-card" aria-labelledby="chart-title">
      <header class="chart-header">
        <div class="chart-heading">
          <h1 id="chart-title"><span id="operator-name">Shell</span> 项目类型结构</h1>
          <p>按项目主类型分类</p>
        </div>
        <p class="header-total"><strong id="header-total">—</strong> 个项目</p>
      </header>

      <section class="donut-card-body">
        <div class="donut-chart-wrap">
          <svg id="project-type-chart" viewBox="0 0 240 240" aria-labelledby="chart-title chart-description">
            <desc id="chart-description">公司项目按油气田类型划分的圆环图</desc>
            <circle class="donut-track" cx="120" cy="120" r="100"></circle>
            <g id="donut-segments"></g>
            <circle class="donut-inner" cx="120" cy="120" r="78"></circle>
            <text id="donut-total" class="donut-total" x="120" y="116" text-anchor="middle">—</text>
            <text class="donut-unit" x="120" y="141" text-anchor="middle">项目总数</text>
          </svg>
        </div>

        <div id="project-type-legend" class="chart-legend" aria-label="项目类型图例"></div>
      </section>

      <div id="chart-tooltip" class="chart-tooltip" role="status" hidden>
        <span class="tooltip-swatch"></span>
        <span class="tooltip-body">
          <span class="tooltip-copy">
            <strong></strong>
            <small></small>
          </span>
          <span class="tooltip-note" hidden></span>
          <span class="tooltip-metrics">
            <span><small>项目数量</small><strong class="tooltip-count"></strong></span>
            <span><small>项目占比</small><strong class="tooltip-percent"></strong></span>
          </span>
        </span>
      </div>

      <div id="chart-state" class="chart-state" aria-live="polite">
        <span class="state-spinner" aria-hidden="true"></span>
        <strong>正在加载项目数据</strong>
      </div>
    </main>

    <script type="module" src="app.js?v=20260721-ui-v2-production"></script>
  </body>
</html>
