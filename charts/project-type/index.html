<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="公司项目类型结构圆环图" />
    <title>项目类型结构</title>
    <link rel="stylesheet" href="styles.css?v=20260709-title-tooltip" />
  </head>
  <body>
    <main class="dashboard-card" aria-labelledby="chart-title">
      <div class="texture-orbit texture-orbit-one" aria-hidden="true"></div>
      <div class="texture-orbit texture-orbit-two" aria-hidden="true"></div>

      <header class="chart-header">
        <h1 id="chart-title"><span id="operator-name">Shell</span> 项目类型结构</h1>
      </header>

      <section class="chart-layout">
        <div class="donut-stage">
          <svg id="project-type-chart" viewBox="0 0 320 268" aria-labelledby="chart-title chart-description">
            <desc id="chart-description">公司项目按油气田类型划分的圆环图</desc>
            <circle class="donut-track" cx="160" cy="134" r="100"></circle>
            <g id="donut-segments"></g>
            <circle class="donut-inner" cx="160" cy="134" r="70"></circle>
            <text id="donut-total" class="donut-total" x="160" y="128" text-anchor="middle">—</text>
            <text class="donut-unit" x="160" y="154" text-anchor="middle">个项目</text>
          </svg>
        </div>

        <div id="project-type-legend" class="chart-legend" aria-label="项目类型图例"></div>
      </section>

      <div id="chart-tooltip" class="chart-tooltip" role="status" hidden>
        <span class="tooltip-swatch"></span>
        <span class="tooltip-body">
          <span class="tooltip-copy">
            <strong></strong>
            <small></small>
          </span>
          <span class="tooltip-note" hidden></span>
          <span class="tooltip-metrics">
            <span><small>项目数量</small><strong class="tooltip-count"></strong></span>
            <span><small>项目占比</small><strong class="tooltip-percent"></strong></span>
          </span>
        </span>
      </div>

      <div id="chart-state" class="chart-state" aria-live="polite">
        <span class="state-spinner" aria-hidden="true"></span>
        <strong>正在加载项目数据</strong>
      </div>
    </main>

    <script type="module" src="app.js?v=20260709-title-tooltip"></script>
  </body>
</html>
