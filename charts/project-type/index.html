<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="公司项目类型结构圆环图" />
    <title>项目类型结构</title>
    <link rel="stylesheet" href="styles.css?v=20260703-project-type" />
  </head>
  <body>
    <main class="dashboard-card" aria-labelledby="chart-title">
      <div class="texture-orbit texture-orbit-one" aria-hidden="true"></div>
      <div class="texture-orbit texture-orbit-two" aria-hidden="true"></div>

      <header class="chart-header">
        <div class="header-mark" aria-hidden="true"></div>
        <div>
          <p class="eyebrow">PROJECT MIX · 2026</p>
          <h1 id="chart-title"><span id="operator-name">Shell</span> 项目类型结构</h1>
        </div>
        <div class="source-badge"><span></span>GLOBAL PORTFOLIO</div>
      </header>

      <section class="chart-layout">
        <div class="donut-stage">
          <svg id="project-type-chart" viewBox="0 0 320 252" aria-labelledby="chart-title chart-description">
            <desc id="chart-description">公司项目按油气田类型划分的圆环图</desc>
            <circle class="donut-track" cx="145" cy="126" r="82"></circle>
            <g id="donut-segments"></g>
            <circle class="donut-inner" cx="145" cy="126" r="58"></circle>
            <text id="donut-total" class="donut-total" x="145" y="120" text-anchor="middle">—</text>
            <text class="donut-unit" x="145" y="145" text-anchor="middle">个项目</text>
          </svg>
        </div>

        <div id="project-type-legend" class="chart-legend" aria-label="项目类型图例"></div>
      </section>

      <div id="chart-tooltip" class="chart-tooltip" role="status" hidden>
        <span class="tooltip-swatch"></span>
        <span class="tooltip-copy">
          <strong></strong>
          <small></small>
        </span>
        <span class="tooltip-value"></span>
      </div>

      <div id="chart-state" class="chart-state" aria-live="polite">
        <span class="state-spinner" aria-hidden="true"></span>
        <strong>正在加载项目数据</strong>
      </div>
    </main>

    <script type="module" src="app.js?v=20260703-project-type"></script>
  </body>
</html>
