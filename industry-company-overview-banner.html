<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="全球能源、海工与工程企业信息检索平台">
  <title>行业公司概览</title>
  <style>
    :root {
      --banner-bg-left: #f8fbfc;
      --banner-bg-right: #edf7f8;
      --banner-heading: #17324d;
      --banner-accent: #d23842;
      --banner-subtitle: #708399;
      --banner-description: #667085;
      --banner-border: #dce6ec;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      margin: 0;
      background: transparent;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    .banner-root {
      width: 100%;
      min-width: 0;
      overflow: visible;
    }

    .company-directory-banner {
      position: relative;
      display: grid;
      grid-template-columns: minmax(360px, .82fr) minmax(520px, 1.18fr);
      align-items: center;
      gap: clamp(28px, 2.8vw, 40px);
      width: 100%;
      height: 188px;
      min-width: 0;
      overflow: hidden;
      padding: 24px clamp(48px, 4vw, 56px);
      border: 1px solid var(--banner-border);
      border-radius: 6px;
      background: linear-gradient(90deg, var(--banner-bg-left) 0%, #f5fafc 55%, var(--banner-bg-right) 100%);
    }

    .banner-copy {
      align-self: center;
      min-width: 0;
      transform: translateY(-5px);
    }

    .banner-title {
      margin: 0;
      color: var(--banner-heading);
      font-size: clamp(38px, 2.4vw, 42px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -.03em;
      white-space: nowrap;
    }

    .banner-title-accent {
      color: var(--banner-accent);
    }

    .banner-kicker {
      margin: 5px 0 0;
      color: var(--banner-subtitle);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: .2em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .banner-description {
      margin: 10px 0 0;
      color: var(--banner-description);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      white-space: nowrap;
    }

    .banner-visual {
      position: relative;
      align-self: center;
      justify-self: stretch;
      width: 100%;
      height: 146px;
      min-width: 0;
      overflow: visible;
      transform: translateY(-6px);
      pointer-events: none;
    }

    .banner-visual img {
      position: absolute;
      display: block;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .vessel-primary {
      right: 37%;
      bottom: 6px;
      width: min(57%, 520px);
      opacity: .7;
    }

    .vessel-secondary {
      top: 4px;
      right: 1%;
      width: min(41%, 370px);
      opacity: .61;
    }

    @media (max-width: 1199px) {
      .company-directory-banner {
        grid-template-columns: minmax(330px, .9fr) minmax(420px, 1.1fr);
        gap: 26px;
        height: 180px;
        padding: 22px 36px;
      }

      .banner-title {
        font-size: 36px;
      }

      .banner-visual {
        height: 138px;
      }

      .vessel-primary {
        right: 14%;
        width: min(60%, 460px);
      }

      .vessel-secondary {
        width: min(40%, 330px);
        opacity: .56;
      }
    }

    @media (max-width: 1023px) {
      .company-directory-banner {
        grid-template-columns: minmax(320px, .95fr) minmax(280px, .8fr);
        gap: 20px;
        height: 174px;
        padding: 20px 28px;
      }

      .banner-title {
        font-size: 32px;
      }

      .banner-kicker {
        font-size: 10px;
        letter-spacing: .17em;
      }

      .banner-description {
        font-size: 12px;
      }

      .banner-visual {
        height: 128px;
      }

      .vessel-primary {
        right: 10%;
        width: min(64%, 420px);
      }

      .vessel-secondary {
        top: 9px;
        width: min(41%, 290px);
        opacity: .48;
      }
    }

    @media (max-width: 767px) {
      .company-directory-banner {
        grid-template-columns: 1fr;
        gap: 12px;
        height: auto;
        min-height: 196px;
        padding: 24px;
      }

      .banner-copy {
        transform: none;
      }

      .banner-title {
        font-size: 36px;
      }

      .banner-visual {
        height: 82px;
        margin-top: 0;
        transform: none;
      }

      .vessel-secondary {
        display: none;
      }

      .vessel-primary {
        position: relative;
        right: auto;
        bottom: auto;
        width: min(86%, 300px);
        margin-left: auto;
      }
    }

    @media (max-width: 420px) {
      .company-directory-banner {
        padding-right: 18px;
        padding-left: 18px;
      }

      .banner-title {
        font-size: 34px;
      }

      .banner-kicker {
        letter-spacing: .14em;
      }

      .banner-description {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="banner-root">
    <section class="company-directory-banner" aria-labelledby="banner-title banner-subtitle">
      <div class="banner-copy">
        <h1 class="banner-title" id="banner-title">行业公司<span class="banner-title-accent">概览</span></h1>
        <p class="banner-kicker" id="banner-subtitle">Industry Company Overview</p>
        <p class="banner-description">全球能源、海工与工程企业信息检索平台</p>
      </div>

      <div class="banner-visual" aria-hidden="true">
        <img class="vessel-primary" src="assets/company-directory-banner-v2/vessel-primary.svg" alt="">
        <img class="vessel-secondary" src="assets/company-directory-banner-v2/vessel-secondary.svg" alt="">
      </div>
    </section>
  </main>
</body>
</html>
