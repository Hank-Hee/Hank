<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>行业公司概览</title>
  <style>
    :root {
      --ink: #081d36;
      --muted: #6f7f91;
      --line: #d9e4ef;
      --line-strong: #9fb3c8;
      --blue: #2f6fe4;
      --teal: #4fb7bc;
      --red: #d42132;
      --panel: rgba(255, 255, 255, .82);
      --shadow: 0 18px 44px rgba(31, 74, 118, .08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--ink);
      font-family: Calibri, "Microsoft YaHei", Arial, sans-serif;
    }

    .banner-shell {
      width: 100%;
      padding: 0;
    }

    .industry-banner {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      width: 100%;
      height: clamp(340px, 30vw, 380px);
      min-height: 340px;
      border: 1px solid rgba(211, 222, 234, .88);
      border-radius: 8px;
      background:
        radial-gradient(circle at 16% 24%, rgba(79, 183, 188, .15), transparent 24%),
        radial-gradient(circle at 78% 18%, rgba(47, 111, 228, .12), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #f8fbfe 100%);
      box-shadow: var(--shadow);
    }

    .industry-banner::before,
    .industry-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .industry-banner::before {
      z-index: -3;
      background:
        linear-gradient(rgba(159, 179, 200, .16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(159, 179, 200, .16) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(90deg, #000 0%, #000 76%, transparent 100%);
    }

    .industry-banner::after {
      z-index: -2;
      background:
        radial-gradient(ellipse at 48% 54%, rgba(255, 255, 255, .48) 0%, rgba(255, 255, 255, .72) 45%, transparent 76%),
        linear-gradient(90deg, rgba(255, 255, 255, .80), transparent 28%, transparent 78%, rgba(255, 255, 255, .86));
    }

    .route-field {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: .92;
      pointer-events: none;
    }

    .route-field svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .sea-line {
      fill: none;
      stroke: rgba(159, 179, 200, .28);
      stroke-width: 1;
    }

    .route {
      fill: none;
      stroke: rgba(47, 111, 228, .30);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 10 20;
      animation: route-flow 16s linear infinite;
    }

    .route.secondary {
      stroke: rgba(79, 183, 188, .32);
      stroke-dasharray: 7 18;
      animation-duration: 20s;
      animation-direction: reverse;
    }

    .route.tertiary {
      stroke: rgba(212, 33, 50, .20);
      stroke-dasharray: 5 15;
      animation-duration: 18s;
    }

    .route-node {
      fill: #ffffff;
      stroke: rgba(47, 111, 228, .44);
      stroke-width: 1.5;
      animation: node-pulse 4.8s ease-in-out infinite;
    }

    .route-node.teal {
      stroke: rgba(79, 183, 188, .52);
      animation-delay: .8s;
    }

    .route-node.red {
      stroke: rgba(212, 33, 50, .50);
      animation-delay: 1.7s;
    }

    .copy-panel {
      position: absolute;
      left: clamp(30px, 6vw, 92px);
      top: 50%;
      z-index: 4;
      width: min(42vw, 560px);
      transform: translateY(-50%);
      padding: clamp(20px, 2.4vw, 30px) clamp(22px, 3vw, 38px);
      border-left: 4px solid var(--red);
      background: linear-gradient(90deg, var(--panel), rgba(255, 255, 255, .40));
      backdrop-filter: blur(2px);
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(44px, 4.9vw, 78px);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 .accent {
      color: var(--red);
    }

    .english-title {
      margin: 16px 0 0;
      color: #8799ad;
      font-size: clamp(13px, 1.08vw, 16px);
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
    }

    .fleet-stage {
      position: absolute;
      right: clamp(12px, 2.5vw, 46px);
      bottom: clamp(18px, 2.8vw, 42px);
      z-index: 3;
      width: min(57vw, 860px);
      height: min(26vw, 305px);
      min-width: 600px;
      min-height: 245px;
      pointer-events: none;
    }

    .fleet-stage svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .facility-line,
    .facility-soft,
    .facility-fill,
    .facility-accent {
      vector-effect: non-scaling-stroke;
    }

    .facility-line {
      fill: none;
      stroke: #6f89a4;
      stroke-width: 1.55;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .facility-soft {
      fill: none;
      stroke: rgba(111, 137, 164, .42);
      stroke-width: 1.05;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .facility-fill {
      fill: rgba(239, 245, 251, .82);
      stroke: #6f89a4;
      stroke-width: 1.35;
      stroke-linejoin: round;
    }

    .facility-accent {
      fill: none;
      stroke: rgba(212, 33, 50, .62);
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .fleet-shadow {
      fill: rgba(69, 99, 132, .08);
    }

    .moving-light {
      fill: var(--teal);
      opacity: .52;
      animation: light-breathe 4.6s ease-in-out infinite;
    }

    .moving-light.red {
      fill: var(--red);
      animation-delay: 1.4s;
    }

    .facility-label {
      fill: #778ba1;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
    }

    .depth-line {
      position: absolute;
      left: 5.8%;
      right: 5.8%;
      bottom: 36px;
      z-index: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(159, 179, 200, .82), transparent);
    }

    .depth-line::before {
      content: "";
      position: absolute;
      left: 58%;
      top: -2px;
      width: 132px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(79, 183, 188, .48), rgba(212, 33, 50, .42), transparent);
      transform: translateX(-50%);
    }

    @keyframes route-flow {
      to {
        stroke-dashoffset: -320;
      }
    }

    @keyframes node-pulse {
      0%,
      100% {
        r: 4.5;
        opacity: .58;
      }
      50% {
        r: 6.5;
        opacity: .94;
      }
    }

    @keyframes light-breathe {
      0%,
      100% {
        opacity: .28;
        transform: translateY(0);
      }
      50% {
        opacity: .86;
        transform: translateY(-7px);
      }
    }

    @media (max-width: 1180px) {
      .copy-panel {
        width: min(45vw, 500px);
      }

      .fleet-stage {
        right: 10px;
        width: 61vw;
        opacity: .82;
      }
    }

    @media (max-width: 860px) {
      .copy-panel {
        left: 26px;
        right: 26px;
        top: 43%;
        width: auto;
        text-align: center;
        border-left: 0;
        border-top: 4px solid var(--red);
        background: linear-gradient(180deg, rgba(255, 255, 255, .84), rgba(255, 255, 255, .28));
      }

      .fleet-stage {
        right: 50%;
        bottom: 4px;
        width: 700px;
        min-width: 700px;
        height: 210px;
        min-height: 210px;
        opacity: .32;
        transform: translateX(50%);
      }
    }

    @media (max-width: 560px) {
      .industry-banner {
        height: 340px;
      }

      .copy-panel {
        left: 18px;
        right: 18px;
        padding: 18px 16px;
      }

      h1 {
        font-size: 42px;
      }

      .english-title {
        letter-spacing: .16em;
      }

      .fleet-stage {
        opacity: .24;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
