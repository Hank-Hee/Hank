<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>行业公司概览</title>
  <style>
    :root {
      --ink: #102a43;
      --muted: #8194a6;
      --brand-red: #d8283a;
      --border: #dce6ee;
      --bg-left: #ffffff;
      --bg-mid: #fbfdfe;
      --bg-right: #f3f7fa;
      --label: #213b55;
      --hull: #f7fafc;
      --module: #eaf2f6;
      --module-teal: #e2f2f1;
      --tank-fill: #eef4f7;
      --line: #6f8ea7;
      --line-soft: #a8bdce;
      --teal-line: #71bfc1;
      --wave-front: #87cdd1;
      --wave-rear: #b5d5e4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .banner-shell {
      width: 100%;
      height: 100vh;
      max-height: 380px;
    }

    .industry-banner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(102deg, var(--bg-left) 0%, var(--bg-mid) 46%, var(--bg-right) 100%);
    }

    .copy-panel {
      position: absolute;
      left: clamp(36px, 6vw, 104px);
      top: 50%;
      z-index: 2;
      width: 38%;
      transform: translateY(-50%);
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(26px, min(4.7vw, 19vh), 76px);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    h1 .accent {
      color: var(--brand-red);
    }

    .english-title {
      margin: clamp(6px, 3.8vh, 16px) 0 0;
      color: var(--muted);
      font-size: clamp(8px, min(1vw, 4vh), 15px);
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .fleet-stage {
      position: absolute;
      top: 0;
      right: clamp(16px, 2vw, 34px);
      z-index: 1;
      width: min(62vw, 1060px);
      height: 100%;
      pointer-events: none;
    }

    .fleet-stage svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .fleet-canvas--compact {
      display: none !important;
    }

    .ship-label {
      position: absolute;
      z-index: 2;
      color: var(--label);
      font-size: clamp(8px, min(.84vw, 3.4vh), 14px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: .16em;
      white-space: nowrap;
    }

    .label-fpso {
      left: 4.2%;
      top: 41%;
    }

    .label-flng {
      left: 52%;
      top: 5.5%;
    }

    .label-fsru {
      left: 70%;
      top: 46%;
    }

    .hull,
    .module,
    .module-teal,
    .tank,
    .structure-line,
    .detail-line,
    .wave-path {
      vector-effect: non-scaling-stroke;
    }

    .hull {
      fill: var(--hull);
      stroke: var(--line);
      stroke-width: 1.5;
      stroke-linejoin: round;
    }

    .module {
      fill: var(--module);
      stroke: var(--line);
      stroke-width: 1.35;
      stroke-linejoin: round;
    }

    .module-teal {
      fill: var(--module-teal);
      stroke: var(--teal-line);
      stroke-width: 1.35;
      stroke-linejoin: round;
    }

    .tank {
      fill: var(--tank-fill);
      stroke: var(--line);
      stroke-width: 1.35;
      stroke-linejoin: round;
    }

    .structure-line {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .detail-line {
      fill: none;
      stroke: var(--line-soft);
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ship--lower {
      animation: lower-float 4.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center bottom;
    }

    .ship--flng {
      animation: upper-float 4.2s ease-in-out -1.4s infinite;
      transform-box: fill-box;
      transform-origin: center bottom;
    }

    .ship--fsru {
      animation: fsru-float 4.4s ease-in-out -1.7s infinite;
    }

    .wave-path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wave-source,
    .wave-path use {
      vector-effect: non-scaling-stroke;
    }

    .wave-front {
      stroke: var(--wave-front);
      stroke-width: 1.6;
      animation-name: front-wave-drift;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      will-change: transform;
    }

    .wave-rear {
      stroke: var(--wave-rear);
      stroke-width: 1.1;
      animation-name: rear-wave-drift;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      will-change: transform;
    }

    .fpso-front { animation-duration: 5.6s; }
    .fpso-rear { animation-duration: 8.2s; }
    .flng-front { animation-duration: 4.7s; }
    .flng-rear { animation-duration: 6.8s; }
    .fsru-front { animation-duration: 5.3s; }
    .fsru-rear { animation-duration: 7.8s; }

    @keyframes lower-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }

    @keyframes upper-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.3px); }
    }

    @keyframes fsru-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }

    @keyframes front-wave-drift {
      to { transform: translateX(-48px); }
    }

    @keyframes rear-wave-drift {
      to { transform: translateX(-64px); }
    }

    @media (max-height: 220px) {
      .industry-banner {
        border-radius: 6px;
      }

      .copy-panel {
        left: clamp(28px, 5vw, 92px);
        width: 36%;
      }

      .fleet-stage {
        right: 14px;
        width: 63%;
      }

      .fleet-canvas--standard {
        display: none !important;
      }

      .fleet-canvas--compact {
        display: block !important;
      }

      .label-fpso {
        left: 3%;
        top: 35%;
      }

      .label-flng {
        left: 52%;
        top: 2%;
      }

      .label-fsru {
        left: 71%;
        top: 39%;
      }

      .english-title {
        letter-spacing: .22em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ship--lower,
      .ship--flng,
      .ship--fsru,
      .wave-front,
      .wave-rear {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="banner-shell">

        <p class="english-title" id="banner-subtitle">Industry Company Overview</p>

</body>
</html>
