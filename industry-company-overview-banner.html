<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="全球能源、海工与工程企业信息检索平台">
  <title>行业公司概览</title>
  <style>
    :root {
      --banner-bg-left: #f8fbfc;
      --banner-bg-right: #edf7f8;
      --banner-heading: #17324d;
      --banner-accent: #c9363e;
      --banner-subtitle: #7890a4;
      --banner-description: #667085;
      --banner-border: #d9e4ea;
      --banner-radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      margin: 0;
      background: transparent;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
    }

    .banner-root {
      width: 100%;
      min-width: 0;
    }

    .industry-banner {
      display: grid;
      grid-template-columns: minmax(420px, .95fr) minmax(520px, 1.35fr);
      gap: clamp(32px, 3vw, 48px);
      width: 100%;
      height: 196px;
      min-width: 0;
      overflow: hidden;
      padding: 28px clamp(48px, 4vw, 64px);
      border: 1px solid var(--banner-border);
      border-radius: var(--banner-radius);
      background: linear-gradient(90deg, var(--banner-bg-left) 0%, #f5f9fb 52%, var(--banner-bg-right) 100%);
    }

    .copy-panel {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    h1 {
      margin: 0;
      color: var(--banner-heading);
      font-size: clamp(42px, 3.1vw, 46px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -.04em;
      white-space: nowrap;
    }

    h1 .accent {
      color: var(--banner-accent);
    }

    .english-title {
      margin: 6px 0 0;
      color: var(--banner-subtitle);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .18em;
      line-height: 1.3;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .description {
      margin: 12px 0 0;
      color: var(--banner-description);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.45;
      white-space: nowrap;
    }

    .fleet-stage {
      display: flex;
      min-width: 0;
      height: 100%;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
    }

    .fleet-stage img {
      display: block;
      width: 100%;
      max-width: 700px;
      height: 100%;
      object-fit: contain;
      object-position: right center;
      opacity: .66;
    }

    @media (max-width: 1199px) {
      .industry-banner {
        grid-template-columns: minmax(360px, .95fr) minmax(400px, 1.05fr);
        gap: 32px;
        height: 188px;
        padding: 24px 32px;
      }

      h1 {
        font-size: 42px;
      }

      .description {
        font-size: 13px;
      }

      .fleet-stage img {
        width: 120%;
        max-width: none;
      }
    }

    @media (max-width: 920px) {
      .industry-banner {
        grid-template-columns: minmax(330px, 1fr) minmax(250px, .72fr);
        gap: 24px;
        height: 184px;
        padding: 22px 28px;
      }

      h1 {
        font-size: 40px;
      }

      .english-title {
        font-size: 11px;
      }

      .fleet-stage {
        overflow: hidden;
      }

      .fleet-stage img {
        width: 160%;
        max-width: none;
        transform: translateX(11%);
      }
    }

    @media (max-width: 767px) {
      .industry-banner {
        grid-template-columns: 1fr;
        gap: 10px;
        height: auto;
        min-height: 210px;
        padding: 18px 24px 14px;
      }

      h1 {
        font-size: 36px;
      }

      .english-title {
        margin-top: 4px;
        font-size: 11px;
        letter-spacing: .14em;
      }

      .description {
        margin-top: 8px;
        font-size: 13px;
      }

      .fleet-stage {
        position: relative;
        display: block;
        height: 72px;
        overflow: hidden;
      }

      .fleet-stage img {
        position: absolute;
        top: 0;
        left: -128%;
        width: 220%;
        max-width: none;
        height: auto;
        transform: translateY(-44%);
      }
    }

    @media (max-width: 420px) {
      .industry-banner {
        padding-right: 18px;
        padding-left: 18px;
      }

      h1 {
        font-size: 34px;
      }

      .description {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="banner-root">
    <section class="industry-banner" aria-labelledby="banner-title banner-subtitle">
      <div class="copy-panel">
        <h1 id="banner-title">行业公司<span class="accent">概览</span></h1>
        <p class="english-title" id="banner-subtitle">Industry Company Overview</p>
        <p class="description">全球能源、海工与工程企业信息检索平台</p>
      </div>

      <div class="fleet-stage" aria-hidden="true">
        <img src="assets/company-directory-banner/company-directory-vessels.svg" alt="">
      </div>
    </section>
  </main>
</body>
</html>
