<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>油气价格波动 | Oil & Gas Price Widgets</title>
  <link rel="stylesheet" href="assets/oil-gas-widget.css">
  <script src="assets/echarts.min.js"></script>
  <script src="assets/oil-gas-widget.js" defer></script>
</head>
<body>
  <main class="og-shell og-shell--dashboard">
    <section class="og-grid" aria-label="油气价格波动总览">
      <article class="og-widget" data-group="oil" data-unit-label="美元/桶">
        <div class="og-state" data-role="state">数据加载中...</div>
        <div data-role="content" hidden>
          <header class="og-head">
            <div class="og-title">
              <h2>原油价格走势</h2>
              <span>Daily Crude Oil Prices</span>
            </div>
            <div class="og-meta">
              <div>区间：<span data-role="range">--</span></div>
              <div>更新：<span data-role="updated">--</span></div>
            </div>
          </header>
          <div class="og-metrics" data-role="metrics"></div>
          <div class="og-chart" data-role="chart" aria-label="原油价格走势"></div>
          <footer class="og-foot">
            <span>延迟期货行情</span>
            <a data-role="source" href="https://finance.yahoo.com/commodities" target="_blank" rel="noopener">Yahoo Finance</a>
          </footer>
        </div>
      </article>

      <article class="og-widget" data-group="gas" data-unit-label="美元/MMBtu">
        <div class="og-state" data-role="state">数据加载中...</div>
        <div data-role="content" hidden>
          <header class="og-head">
            <div class="og-title">
              <h2>天然气与 LNG 价格走势</h2>
              <span>Daily Natural Gas & LNG Prices</span>
            </div>
            <div class="og-meta">
              <div>区间：<span data-role="range">--</span></div>
              <div>更新：<span data-role="updated">--</span></div>
            </div>
          </header>
          <div class="og-metrics" data-role="metrics"></div>
          <div class="og-chart" data-role="chart" aria-label="天然气与 LNG 价格走势"></div>
          <footer class="og-foot">
            <span>延迟期货行情</span>
            <a data-role="source" href="https://finance.yahoo.com/commodities" target="_blank" rel="noopener">Yahoo Finance</a>
          </footer>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
