<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ADNOC 按 Region 展示的净产量分析看板">
  <title>ADNOC 地区净产量</title>
  <script src="assets/echarts.min.js"></script>
  <style>
    :root {
      --brand-900: #17324d;
      --brand-700: #244e70;
      --brand-600: #356582;
      --accent-teal: #16847a;
      --accent-gold: #d5b46a;
      --surface: #ffffff;
      --text-primary: #17212b;
      --text-secondary: #667085;
      --text-tertiary: #8a94a3;
      --border: #d9e1e8;
      --divider: #e9edf1;
      --gridline: #e7edf2;
      --radius-sm: 4px;
      --radius-md: 6px;
      --shadow-sm: 0 1px 3px rgba(16, 24, 40, .06);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-width: 0;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      color: var(--text-primary);
      background: var(--surface);
      font-family: Inter, Arial, "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; }

    .dashboard {
      width: 100%;
      min-width: 0;
      padding: 0;
    }

    .chart-card {
      min-width: 0;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }

    .chart-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .chart-head h1 {
      margin: 0;
      color: var(--brand-900);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }

    .chart-head p {
      margin: 3px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .chart-actions {
      display: flex;
      flex: none;
      gap: 4px;
    }

    .chart-action {
      display: grid;
      width: 32px;
      height: 32px;
      padding: 0;
      place-items: center;
      color: var(--brand-600);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .chart-action:hover,
    .chart-action:focus-visible {
      color: var(--brand-700);
      background: #f8fafb;
      border-color: #bccbd7;
      outline: none;
    }

    .chart-action svg { width: 17px; height: 17px; }
    .chart-action.is-loading svg { animation: spin .75s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .chart-stage {
      position: relative;
      min-height: 400px;
      height: clamp(400px, 54vh, 460px);
      border-top: 1px solid var(--divider);
    }

    #production-chart {
      width: 100%;
      height: 100%;
    }

    .chart-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, .88);
      font-size: 13px;
    }

    .chart-loading[hidden] { display: none; }

    .legend-zone {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
      max-height: 58px;
      margin-top: 10px;
      padding-top: 10px;
      overflow: hidden;
      border-top: 1px solid var(--divider);
    }

    .legend-label {
      flex: none;
      padding-top: 2px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 650;
    }

    .region-legend {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 7px 14px;
      min-width: 0;
      max-height: 38px;
      overflow: hidden;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 1px 0;
      color: #475467;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.3;
      text-align: left;
      white-space: nowrap;
    }

    .legend-item:hover { color: var(--brand-700); }
    .legend-item.is-muted { color: #98a2b3; text-decoration: line-through; }
    .legend-swatch { width: 9px; height: 9px; flex: none; border-radius: 1px; }

    .forecast-key {
      display: inline-flex;
      flex: none;
      align-items: center;
      gap: 6px;
      padding-top: 1px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
    }

    .forecast-key i {
      width: 18px;
      height: 0;
      border-top: 1.5px dashed #b54747;
    }

    .chart-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--divider);
      color: var(--text-tertiary);
      font-size: 11px;
      line-height: 1.35;
    }

    .chart-footer .company-note {
      flex-basis: 100%;
      color: var(--text-secondary);
    }

    .chart-card:fullscreen {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 20px;
      border: 0;
      border-radius: 0;
    }

    .chart-card:fullscreen .chart-stage {
      flex: 1;
      height: auto;
    }

    @media (max-width: 1000px) {
      .region-legend {
        flex-wrap: nowrap;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
      }
    }

    @media (max-width: 760px) {
      .chart-card { padding: 16px; }
      .chart-head { gap: 10px; }
      .chart-stage { min-height: 320px; height: 400px; }
      .legend-zone { flex-direction: column; max-height: none; gap: 7px; }
      .region-legend { width: 100%; }
      .chart-footer { display: block; }
      .chart-footer span + span { display: block; margin-top: 2px; }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="chart-card" aria-labelledby="page-title">
      <header class="chart-head">
        <div>
          <h1 id="page-title">ADNOC 地区净产量</h1>
          <p>Net production · Unit: kbbl/d</p>
        </div>
        <div class="chart-actions" aria-label="图表操作">
          <button id="export-button" class="chart-action" type="button" aria-label="下载 Excel 源数据" title="下载 Excel 源数据">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 14v5h14v-5"/></svg>
          </button>
          <button id="refresh-button" class="chart-action" type="button" aria-label="刷新图表数据" title="刷新图表数据">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M20 11a8 8 0 1 0 2 5.3M20 4v7h-7"/></svg>
          </button>
          <button id="fullscreen-button" class="chart-action" type="button" aria-label="全屏查看图表" title="全屏查看图表" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path d="M8 3H3v5m13-5h5v5M3 16v5h5m13-5v5h-5"/></svg>
          </button>
        </div>
      </header>

      <div class="chart-stage">
        <div id="production-chart" role="img" aria-label="按地区展示 ADNOC 净产量"></div>
        <div id="chart-loading" class="chart-loading">正在加载生产数据…</div>
      </div>

      <div class="legend-zone">
        <span class="legend-label">Region</span>
        <div id="region-legend" class="region-legend" aria-label="地区图例；点击可显示或隐藏地区"></div>
        <span class="forecast-key"><i aria-hidden="true"></i>Forecast</span>
      </div>
      <footer class="chart-footer">
        <span>Source: Company disclosures · Internal database</span>
        <span>Data range: 2015–2050</span>
      </footer>
    </section>
  </main>

  <script>
    (() => {
      const firstForecastYear = 2026;
      const palette = {
        "Australasia": "#7b739d",
        "East Asia": "#9e7c6b",
        "South East Asia": "#b2876b",
        "Middle East": "#16847a",
        "North Africa": "#9bae63",
        "East Africa": "#d5b46a",
        "South Africa": "#8f9f73",
        "West Africa": "#a9bbc9",
        "South America": "#d5b46a",
        "North America": "#244e70",
        "Western Europe": "#7896aa",
        "Southern Europe": "#6f8294",
        "Russia": "#4f7f87",
        "Central Asia": "#c6a6a0",
        "Melanesia, Micronesia & Polynesia": "#d8e0e6"
      };

      const chartCard = document.querySelector(".chart-card");
      const chartElement = document.getElementById("production-chart");
      const loadingElement = document.getElementById("chart-loading");
      const legendElement = document.getElementById("region-legend");
      const exportButton = document.getElementById("export-button");
      const refreshButton = document.getElementById("refresh-button");
      const fullscreenButton = document.getElementById("fullscreen-button");
      let chart;
      const selected = new Set();

      const formatNumber = (value, digits = 1) => new Intl.NumberFormat("en-US", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      }).format(value);

      const downloadSourceWorkbook = () => {
        const anchor = document.createElement("a");
        anchor.href = "data/adnoc-net-production-source.xlsx?v=20260721-companies";
        anchor.download = "ADNOC产量.xlsx";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      };

      const rankedRegions = (data) => [...data.regions].sort((left, right) => {
        const total = region => data.data.reduce((sum, row) => sum + (row.values[region] || 0), 0);
        return total(right) - total(left);
      });

      const renderLegend = (regions) => {
        legendElement.replaceChildren();
        regions.forEach((region) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "legend-item";
          item.dataset.region = region;
          item.innerHTML = `<span class="legend-swatch" style="background:${palette[region] || '#a9bbc9'}"></span><span>${region}</span>`;
          item.addEventListener("click", () => {
            if (selected.has(region)) selected.delete(region); else selected.add(region);
            item.classList.toggle("is-muted", !selected.has(region));
            chart.dispatchAction({ type: "legendToggleSelect", name: region });
          });
          legendElement.appendChild(item);
        });
      };

      const chartOption = (data) => {
        const years = data.data.map(item => item.year);
        const firstSeries = data.regions[0];
        const compactYearAxis = chartElement.clientWidth < 1500;
        return {
          animationDuration: 520,
          animationEasing: "cubicOut",
          color: data.regions.map(region => palette[region] || "#a9bbc9"),
          grid: { left: 62, right: 30, top: 40, bottom: 54, containLabel: false },
          tooltip: {
            trigger: "axis",
            axisPointer: { type: "line", lineStyle: { color: "#8a94a3", width: 1, type: "dashed" } },
            position(point, params, dom, rect, size) {
              const [viewWidth, viewHeight] = size.viewSize;
              const [contentWidth, contentHeight] = size.contentSize;
              const left = point[0] > viewWidth * .62
                ? Math.max(16, point[0] - contentWidth - 18)
                : Math.min(viewWidth - contentWidth - 16, point[0] + 18);
              const top = Math.min(Math.max(16, point[1] - contentHeight / 2), viewHeight - contentHeight - 16);
              return [left, top];
            },
            backgroundColor: "#ffffff",
            borderColor: "#d9e1e8",
            borderWidth: 1,
            padding: 0,
            textStyle: { color: "#344054", fontSize: 12 },
            extraCssText: "min-width:300px; padding:0 10px; box-shadow:0 8px 24px rgba(16,24,40,.10); border-radius:6px; overflow:hidden;",
            formatter(params) {
              const row = data.data[params[0].dataIndex];
              const forecast = row.year >= firstForecastYear
                ? '<span style=\"margin-left:8px;color:#b54747;font-size:11px;font-weight:650\">Forecast</span>'
                : "";
              const active = params
                .filter(item => selected.has(item.seriesName) && item.value > 0)
                .sort((a, b) => b.value - a.value)
                .map(item => `<tr><td style=\"padding:3px 16px 3px 0;color:#475467;white-space:nowrap\"><span style=\"display:inline-block;width:8px;height:8px;border-radius:1px;background:${item.color};margin-right:6px\"></span>${item.seriesName}</td><td style=\"padding:3px 0;text-align:right;color:#344054;font-weight:600;white-space:nowrap\">${formatNumber(item.value)} kbbl/d</td></tr>`)
                .join("");
              return `<div style=\"min-width:276px\"><div style=\"padding:10px 12px 8px;border-bottom:1px solid #e9edf1;font-weight:700;color:#17324d\">${row.year}${forecast}</div><table style=\"width:100%;border-collapse:collapse;padding:8px 12px\"><tbody>${active || '<tr><td style=\"padding:9px 0;color:#8a94a3\">No region selected</td></tr>'}</tbody></table><div style=\"display:flex;justify-content:space-between;gap:16px;padding:8px 12px;background:#f8fafb;border-top:1px solid #e9edf1;color:#475467\"><span>Total</span><strong style=\"color:#344054;font-weight:700;white-space:nowrap\">${formatNumber(row.total)} kbbl/d</strong></div></div>`;
            }
          },
          legend: { show: false },
          xAxis: {
            type: "category",
            boundaryGap: false,
            data: years,
            axisLine: { lineStyle: { color: "#d9e1e8" } },
            axisTick: { show: false },
            axisLabel: {
              color: "#667085",
              fontSize: 11,
              margin: 17,
              interval: compactYearAxis ? (index => index !== years.length - 1 && index % 2 === 1) : 0
            }
          },
          yAxis: {
            type: "value",
            name: "Production (kbbl/d)",
            nameLocation: "end",
            nameGap: 16,
            nameTextStyle: { color: "#526570", fontSize: 12, fontWeight: 600, align: "left" },
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: { color: "#667085", fontSize: 11, formatter: value => new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(value) },
            splitLine: { show: true, lineStyle: { color: "#e7edf2", width: 1 } }
          },
          series: data.regions.map((region) => ({
            name: region,
            type: "line",
            stack: "production",
            smooth: 0.13,
            showSymbol: false,
            symbol: "circle",
            symbolSize: 5,
            lineStyle: { width: 1, color: palette[region] },
            areaStyle: { color: palette[region], opacity: .86 },
            emphasis: { focus: "series", lineStyle: { width: 1.6 }, areaStyle: { opacity: 1 } },
            markArea: region === firstSeries ? {
              silent: true,
              label: { show: false },
              itemStyle: { color: "rgba(255,255,255,.26)" },
              data: [[{ xAxis: firstForecastYear }, { xAxis: years[years.length - 1] }]]
            } : undefined,
            markLine: region === firstSeries ? {
              symbol: "none",
              silent: true,
              lineStyle: { color: "#b54747", width: 1.5, type: "dashed" },
              label: { show: true, formatter: "Forecast", color: "#b54747", fontSize: 11, fontWeight: 650, position: "insideEndTop" },
              data: [{ xAxis: firstForecastYear }]
            } : undefined,
            data: data.data.map(item => item.values[region])
          }))
        };
      };

      const renderChart = (data) => {
        const previouslySelected = new Set(selected);
        selected.clear();
        data.regions.forEach(region => {
          if (previouslySelected.size === 0 || previouslySelected.has(region)) selected.add(region);
        });
        if (chart) chart.dispose();
        chart = echarts.init(chartElement, null, { renderer: "canvas" });
        chart.setOption(chartOption(data));
        renderLegend(rankedRegions(data));
        loadingElement.hidden = true;
      };

      const loadData = (refresh = false) => {
        loadingElement.hidden = false;
        loadingElement.textContent = "正在加载生产数据…";
        loadingElement.style.color = "#667085";
        refreshButton.classList.toggle("is-loading", refresh);
        const refreshKey = refresh ? `&refresh=${Date.now()}` : "";
        return fetch(`data/adnoc-net-production-by-region.json?v=20260721-companies${refreshKey}`)
          .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
          })
          .then(renderChart)
          .catch(error => {
            loadingElement.hidden = false;
            loadingElement.textContent = `生产数据加载失败：${error.message}`;
            loadingElement.style.color = "#b54747";
            console.error(error);
          })
          .finally(() => refreshButton.classList.remove("is-loading"));
      };

      const updateFullscreenState = () => {
        const active = document.fullscreenElement === chartCard;
        fullscreenButton.setAttribute("aria-pressed", String(active));
        fullscreenButton.title = active ? "退出全屏" : "全屏查看图表";
        fullscreenButton.setAttribute("aria-label", fullscreenButton.title);
        requestAnimationFrame(() => chart && chart.resize());
      };

      exportButton.addEventListener("click", downloadSourceWorkbook);
      refreshButton.addEventListener("click", () => { void loadData(true); });
      fullscreenButton.addEventListener("click", async () => {
        try {
          if (document.fullscreenElement) await document.exitFullscreen();
          else await chartCard.requestFullscreen();
        } catch (_) {
          fullscreenButton.blur();
        }
      });
      document.addEventListener("fullscreenchange", updateFullscreenState);
      window.addEventListener("resize", () => chart && chart.resize());

      void loadData();
    })();
  </script>
</body>
</html>
