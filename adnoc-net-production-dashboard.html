<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ADNOC 按 Region 展示的净产量分析看板">
  <title>ADNOC 地区净产量</title>
  <script src="assets/echarts.min.js"></script>
  <style>
    :root {
      --brand-900: #17324d;
      --brand-700: #244e70;
      --brand-600: #356582;
      --accent-teal: #16847a;
      --accent-gold: #d5b46a;
      --surface: #ffffff;
      --text-primary: #17212b;
      --text-secondary: #667085;
      --text-tertiary: #8a94a3;
      --border: #d9e1e8;
      --divider: #e9edf1;
      --gridline: #e7edf2;
      --radius-sm: 4px;
      --radius-md: 6px;
      --shadow-sm: 0 1px 3px rgba(16, 24, 40, .06);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-width: 0;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      color: var(--text-primary);
      background: var(--surface);
      font-family: Inter, Arial, "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; }

    .dashboard {
      width: 100%;
      min-width: 0;
      padding: 0;
    }

    .chart-card {
      min-width: 0;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }

    .chart-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .chart-head h1 {
      margin: 0;
      color: var(--brand-900);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }

    .chart-head p {
      margin: 3px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.35;
    }

    .chart-head .company-note { color: var(--text-tertiary); }

    .chart-stage {
      position: relative;
      min-height: 410px;
      height: 410px;
      border-top: 1px solid var(--divider);
    }

    #production-chart {
      width: 100%;
      height: 100%;
    }

    .chart-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, .88);
      font-size: 13px;
    }

    .chart-loading[hidden] { display: none; }

    .legend-zone {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
      max-height: 56px;
      margin-top: 8px;
      padding-top: 8px;
      overflow: hidden;
      border-top: 1px solid var(--divider);
    }

    .legend-label {
      flex: none;
      padding-top: 2px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 650;
    }

    .region-legend {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 7px 14px;
      min-width: 0;
      max-height: 38px;
      overflow: hidden;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 1px 0;
      color: #475467;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.3;
      text-align: left;
      white-space: nowrap;
    }

    .legend-item:hover { color: var(--brand-700); }
    .legend-item.is-muted { color: #98a2b3; text-decoration: line-through; }
    .legend-swatch { width: 9px; height: 9px; flex: none; border-radius: 1px; }

    .forecast-key {
      display: inline-flex;
      flex: none;
      align-items: center;
      gap: 6px;
      padding-top: 1px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
    }

    .forecast-key i {
      width: 18px;
      height: 0;
      border-top: 1.5px dashed #b54747;
    }

    @media (max-width: 1000px) {
      .region-legend {
        flex-wrap: nowrap;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
      }
    }

    @media (max-width: 760px) {
      .chart-card { padding: 16px; }
      .chart-head { gap: 10px; }
      .chart-stage { min-height: 350px; height: 360px; }
      .legend-zone { flex-direction: column; max-height: none; gap: 7px; }
      .region-legend { width: 100%; }
    }
  </style>
</head>

        chart = echarts.init(chartElement, null, { renderer: "canvas" });
        chart.setOption(chartOption(data));
        renderLegend(rankedRegions(data));
        loadingElement.hidden = true;
      };

      window.addEventListener("resize", () => chart && chart.resize());
      renderChart(dashboardData);
    })();
  </script>
</body>
</html>
