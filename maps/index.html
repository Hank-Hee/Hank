<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="公司项目分布地图" />
    <title>公司全球项目分布</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
    <link rel="stylesheet" href="styles.css?v=20260721-ui-v2-production" />
  </head>
  <body>
    <main id="map-card" class="dashboard-card map-card">
      <header class="chart-header">
        <div class="chart-heading">
          <h1><span id="operator-name">Shell</span> 全球项目分布</h1>
          <p>按项目所在地聚合展示，气泡大小代表项目数量</p>
        </div>
        <div class="chart-actions" aria-label="地图操作">
          <button id="refresh-button" type="button" aria-label="刷新地图" title="刷新地图">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6v5h-5M4 18v-5h5M6.1 9A7 7 0 0 1 18.8 7.1L20 11M4 13l1.2 3.9A7 7 0 0 0 17.9 15" /></svg>
          </button>
          <button id="new-window-button" type="button" aria-label="在新窗口打开" title="在新窗口打开">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4h6v6M20 4l-9 9M19 13v6H5V5h6" /></svg>
          </button>
          <button id="fullscreen-button" type="button" aria-label="全屏查看" title="全屏查看">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5" /></svg>
          </button>
        </div>
      </header>

      <section class="map-stage" aria-label="公司项目区域分布交互地图">
        <div id="map"></div>

        <button id="overview-button" class="overview-button" type="button" aria-label="返回区域总览" title="返回区域总览">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h6v6H4V5Zm10 0h6v6h-6V5ZM4 15h6v4H4v-4Zm10 0h6v4h-6v-4Z" /></svg>
          <span>区域总览</span>
        </button>

        <section id="project-drawer" class="project-drawer" aria-label="国家项目列表" aria-hidden="true">
          <button id="drawer-toggle" class="drawer-mobile-toggle" type="button" aria-expanded="true" aria-controls="drawer-content">
            <span class="drawer-handle-bar" aria-hidden="true"></span>
            <span id="drawer-toggle-label">收起项目面板</span>
          </button>
          <div class="drawer-head">
            <div>
              <div id="drawer-kicker" class="drawer-kicker">COUNTRY PROJECTS</div>
              <h2 id="drawer-title">项目列表</h2>
              <p id="drawer-summary"></p>
            </div>
            <button id="drawer-close" class="drawer-close" type="button" aria-label="关闭项目列表">×</button>
          </div>
          <div id="drawer-content" class="drawer-content">
            <div id="project-list-view" class="project-list-view">
              <div class="drawer-toolbar">
                <label class="drawer-search">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m2.3-5.2A7.5 7.5 0 1 1 4 11.5a7.5 7.5 0 0 1 15 0Z" /></svg>
                  <input id="project-search" type="search" placeholder="搜索项目名称" autocomplete="off" />
                </label>
                <button id="project-filter-toggle" class="project-filter-toggle" type="button" aria-expanded="false" aria-controls="project-filter-panel">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10m4 0h2M4 17h2m4 0h10M14 4v6M6 14v6" /></svg>
                  <span>筛选</span>
                  <span id="project-filter-count" class="project-filter-count" hidden>0</span>
                </button>
              </div>

              <section id="project-filter-panel" class="project-filter-panel" aria-label="项目筛选条件" hidden>
                <div class="filter-panel-head">
                  <strong>筛选项目</strong>
                  <button id="project-filter-clear" type="button">清除全部</button>
                </div>
                <fieldset>
                  <legend>设施类型</legend>
                  <div id="facility-filter-options" class="facility-filter-options"></div>
                </fieldset>
                <fieldset>
                  <legend>储量</legend>
                  <div id="resource-filter-options" class="resource-filter-options"></div>
                </fieldset>
              </section>

              <div id="project-list" class="project-list" role="list"></div>
            </div>

            <article id="project-detail-view" class="project-detail-view" hidden>
              <button id="project-detail-back" class="project-detail-back" type="button">
                <span aria-hidden="true">←</span>
                返回项目列表
              </button>
              <div id="project-detail-content" class="project-detail-content"></div>
            </article>
          </div>
        </section>

        <div class="map-legend">
          <span class="legend-symbol"></span>
          <span>圆点数字代表项目数量</span>
        </div>

        <div id="empty-state" class="empty-state" role="status">
          <strong>正在加载地图数据</strong>
          <span>请稍候。</span>
        </div>
      </section>

      <footer class="map-footer">
        <span>项目总数 <strong id="total-projects">0</strong> · 覆盖国家/地区 <strong id="country-count">0</strong> 个</span>
        <span id="map-scope">全球展示</span>
      </footer>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js?v=20260721-ui-v2-production"></script>
  </body>
</html>
