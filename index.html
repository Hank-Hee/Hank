<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公司画像卡片静态展示</title>
  <style>
    :root {
      --navy: #132743;
      --red: #c72030;
      --red-hover: #a91525;
      --soft: #eef3f8;
      --card: #ffffff;
      --line: #d9e3ee;
      --ink: #071a34;
      --muted: #4c5f78;
      --shadow: 0 1px 3px rgba(19, 39, 67, .08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      color: var(--ink);
      background: var(--soft);
      font-family: Calibri, "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .cards-strip {
      width: 100%;
      padding: 16px 24px;
    }

    .company-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .company-card {
      min-height: 188px;
      padding: 18px 16px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .company-card h2 {
      margin: 0 0 9px;
      color: var(--navy);
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .company-meta {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .company-counts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .company-counts strong {
      display: block;
      margin-bottom: 2px;
      color: #06162d;
      font-size: 17px;
      line-height: 1;
      font-weight: 800;
    }

    .company-counts span {
      color: #24364d;
      font-size: 12px;
      line-height: 1.2;
    }

    .red-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 37px;
      border-radius: 6px;
      background: var(--red);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 14px;
      text-decoration: none;
      transition: background .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .red-button:hover {
      background: var(--red-hover);
      box-shadow: 0 4px 10px rgba(199, 32, 48, .18);
      transform: translateY(-1px);
    }

    @media (max-width: 960px) {
      body {
        overflow: auto;
      }

      .company-card-grid {
        grid-template-columns: 1fr;
      }

      .company-meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="cards-strip" aria-label="公司画像卡片静态展示">
    <section class="company-card-grid">
      <article class="company-card">
        <h2>ADNOC</h2>
        <p class="company-meta">NOC｜资源型公司｜UAE｜LNG｜上游资源</p>
        <div class="company-counts" aria-label="ADNOC 关联统计">
          <span><strong>3</strong>项目</span>
          <span><strong>2</strong>资源</span>
          <span><strong>5</strong>动态</span>
          <span><strong>4</strong>报告</span>
        </div>
        <a class="red-button" href="#" aria-label="查看 ADNOC 公司画像">查看公司画像</a>
      </article>

      <article class="company-card">
        <h2>Shell</h2>
        <p class="company-meta">IOC｜UK｜LNG｜上游｜Trading｜合作方/竞对</p>
        <div class="company-counts" aria-label="Shell 关联统计">
          <span><strong>6</strong>项目</span>
          <span><strong>4</strong>资源</span>
          <span><strong>8</strong>动态</span>
          <span><strong>7</strong>报告</span>
        </div>
        <a class="red-button" href="#" aria-label="查看 Shell 公司画像">查看公司画像</a>
      </article>

      <article class="company-card">
        <h2>MODEC</h2>
        <p class="company-meta">船东｜Japan｜FPSO｜海工浮式设施｜合作方/竞对</p>
        <div class="company-counts" aria-label="MODEC 关联统计">
          <span><strong>4</strong>项目</span>
          <span><strong>0</strong>资源</span>
          <span><strong>3</strong>动态</span>
          <span><strong>2</strong>报告</span>
        </div>
        <a class="red-button" href="#" aria-label="查看 MODEC 公司画像">查看公司画像</a>
      </article>
    </section>
  </main>
</body>
</html>
