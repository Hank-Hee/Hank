<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>行业研究库</title>
<style>
  :root {
    --brand-900: #17324d;
    --brand-700: #244e70;
    --accent-teal: #16847a;
    --accent-gold: #d5b46a;
    --text-secondary: #667085;
    --border: #d7e4e6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; }

  body {
    background: transparent;
    color: var(--brand-900);
    font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
  }

  .library-hero {
    min-height: 240px;
    display: grid;
    grid-template-columns: minmax(0, 1.45fr) minmax(300px, .85fr);
    align-items: center;
    gap: 32px;
    padding: 21px 42px;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: linear-gradient(100deg, #fff 0%, #f7fbfc 58%, #edf8f8 100%);
  }

  .eyebrow {
    margin-bottom: 6px;
    color: var(--accent-teal);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2em;
  }

  h1 {
    margin: 0;
    color: var(--brand-900);
    font-size: 38px;
    font-weight: 750;
    letter-spacing: .06em;
    line-height: 1.15;
  }

  h1 span { color: var(--accent-teal); }

  .en-title {
    margin: 5px 0 0;
    color: #7c91a3;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .26em;
  }

  .description {
    margin: 12px 0 0;
    color: var(--text-secondary);
    font-size: 15px;
    line-height: 1.6;
  }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 26px;
    margin: 12px 0 0;
  }

  .stat {
    position: relative;
    min-width: 112px;
    padding-left: 12px;
  }

  .stat::before {
    content: "";
    position: absolute;
    left: 0;
    top: 4px;
    width: 2px;
    height: 30px;
    background: var(--accent-gold);
  }

  .stat strong {
    display: block;
    color: var(--brand-900);
    font-size: 18px;
    line-height: 1.1;
  }

  .stat span {
    display: block;
    margin-top: 4px;
    color: #7b8794;
    font-size: 11px;
  }

  .art { width: 100%; min-width: 0; }
  .art svg { display: block; width: 100%; max-height: 214px; }

  @media (max-width: 820px) {
    .library-hero {
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 18px;
      padding: 28px 30px;
    }
    h1 { font-size: 35px; }
    .description { font-size: 14px; }
  }

  @media (max-width: 620px) {
    .library-hero { grid-template-columns: 1fr; min-height: 0; }
    .art { display: none; }
    .stats { gap: 14px 18px; }
  }
</style>
</head>
<body>
  <main class="library-hero" aria-label="行业研究库">
    <section>
      <div class="eyebrow">RESEARCH ARCHIVE</div>
      <h1>行业<span>研究</span>库</h1>
      <p class="en-title">INDUSTRY RESEARCH LIBRARY</p>
      <p class="description">集中管理行业报告、区域专题、价格跟踪与政策信息。</p>
      <div class="stats" aria-label="研究库统计">
        <div class="stat"><strong data-stat="reports">—</strong><span>示例报告</span></div>
        <div class="stat"><strong data-stat="sources">—</strong><span>来源机构</span></div>
        <div class="stat"><strong data-stat="updated">—</strong><span>最近更新</span></div>
      </div>
    </section>

    <div class="art" aria-hidden="true">
      <svg viewBox="0 0 520 250" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="#75bfc1" fill-opacity=".34"/>
          </pattern>
          <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
            <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#7bb8ba" flood-opacity=".12"/>
          </filter>
        </defs>

        <ellipse cx="282" cy="122" rx="210" ry="100" fill="url(#dots)"/>
        <ellipse cx="282" cy="122" rx="178" ry="84" stroke="#c4e3e3"/>
        <path d="M105 122H459M140 80H430M140 164H430" stroke="#d1e9e9"/>

        <g class="report-cube" filter="url(#soft-shadow)">
          <path d="M118 60L183 38L237 59L170 83L118 60Z" fill="#fff" fill-opacity=".92" stroke="#68bfc2" stroke-width="1.8"/>
          <path d="M118 60V145L170 169V83L118 60Z" fill="#f9fefe" stroke="#68bfc2" stroke-width="1.8"/>
          <path d="M170 83L237 59V142L170 169V83Z" fill="#eaf7f7" stroke="#68bfc2" stroke-width="1.8"/>
          <path d="M133 80L158 90M133 94L158 104M188 91L220 79M188 105L220 93" stroke="#9acfd0" stroke-width="2" stroke-linecap="round"/>
        </g>

        <g class="report-cube" filter="url(#soft-shadow)">
          <path d="M244 82L300 64L349 82L297 101L244 82Z" fill="#fff" fill-opacity=".9" stroke="#72c2c4" stroke-width="1.8"/>
          <path d="M244 82V153L297 175V101L244 82Z" fill="#f9fefe" stroke="#72c2c4" stroke-width="1.8"/>
          <path d="M297 101L349 82V148L297 175V101Z" fill="#eaf7f7" stroke="#72c2c4" stroke-width="1.8"/>
          <path d="M259 101L284 111M259 115L284 125M312 111L335 102M312 125L335 116" stroke="#9acfd0" stroke-width="2" stroke-linecap="round"/>
        </g>

        <g class="report-cube" filter="url(#soft-shadow)">
          <path d="M355 106L402 91L444 106L399 124L355 106Z" fill="#fff" fill-opacity=".88" stroke="#7ac6c8" stroke-width="1.8"/>
          <path d="M355 106V160L399 179V124L355 106Z" fill="#f9fefe" stroke="#7ac6c8" stroke-width="1.8"/>
          <path d="M399 124L444 106V157L399 179V124Z" fill="#eaf7f7" stroke="#7ac6c8" stroke-width="1.8"/>
          <path d="M368 123L390 132M368 137L390 146M412 133L431 126" stroke="#9acfd0" stroke-width="2" stroke-linecap="round"/>
        </g>

        <g class="energy-mark" transform="translate(178 207)">
          <circle r="20" fill="#f7fdfd" stroke="#82c8ca" stroke-width="1.5"/>
          <ellipse cy="-7" rx="8" ry="3.5" stroke="#16847a" stroke-width="1.8"/>
          <path d="M-8-7V8C-8 11 8 11 8 8V-7M-8 1C-5 4 5 4 8 1" stroke="#16847a" stroke-width="1.8"/>
        </g>

        <g class="energy-mark" transform="translate(282 207)">
          <circle r="20" fill="#f7fdfd" stroke="#82c8ca" stroke-width="1.5"/>
          <path d="M1-13C6-6 10-2 9 5C8 12 3 15-2 14C-9 13-12 8-10 2C-8-3-4-6-4-11C0-8 2-5 1-1C4-4 3-9 1-13Z" stroke="#16847a" stroke-width="1.8" stroke-linejoin="round"/>
        </g>

        <g class="energy-mark" transform="translate(386 207)">
          <circle r="20" fill="#f7fdfd" stroke="#82c8ca" stroke-width="1.5"/>
          <circle cy="-4" r="2.5" fill="#d8f1f1" stroke="#16847a" stroke-width="1.5"/>
          <path d="M0-7V-16M2-3L11 2M-2-3L-11 2M0-1V10M-12 13C-8 10-4 16 0 13C4 10 8 16 12 13" stroke="#16847a" stroke-width="1.7" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
  </main>

<script>
  const archiveSummary = {
    totalReports: 24,
    sourceCount: 8,
    latestUpdated: "2026-07-22"
  };

  document.querySelector('[data-stat="reports"]').textContent = archiveSummary.totalReports;
  document.querySelector('[data-stat="sources"]').textContent = archiveSummary.sourceCount;
  document.querySelector('[data-stat="updated"]').textContent = archiveSummary.latestUpdated;
</script>
</body>
</html>
