<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>行业研究库</title>
<style>
  :root {
    --navy: #0d2d4f;
    --ink: #183a5d;
    --muted: #617b95;
    --red: #e73345;
    --line: #80cbd3;
    --line-soft: rgba(89, 180, 195, .23);
    --paper: rgba(255,255,255,.72);
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
  body {
    color: var(--ink);
    background: #f8fcfd;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
  }

  .banner {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 330px;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(ellipse at 74% 57%, rgba(150, 220, 225, .36) 0%, rgba(218, 242, 244, .42) 26%, rgba(249, 253, 253, 0) 55%),
      linear-gradient(103deg, #ffffff 0%, #fbfdfd 38%, #edf9fa 100%);
  }

  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    opacity: .42;
    background-image:
      linear-gradient(rgba(127, 196, 204, .17) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127, 196, 204, .17) 1px, transparent 1px);
    background-size: 30px 30px;
    mask-image: linear-gradient(90deg, transparent 0%, transparent 40%, black 65%, transparent 100%);
  }

  .wash {
    position: absolute;
    inset: auto 0 0;
    height: 38%;
    z-index: -1;
    background: linear-gradient(180deg, transparent, rgba(187, 231, 234, .23));
  }

  .content {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    width: min(100%, 1780px);
    height: 100%;
    margin: 0 auto;
    padding: 34px clamp(38px, 7.4vw, 138px) 40px;
  }

  .copy {
    width: min(47vw, 710px);
    transform: translateY(-3px);
  }

  h1 {
    margin: 0;
    color: var(--navy);
    font-size: clamp(48px, 5.15vw, 88px);
    font-weight: 800;
    letter-spacing: -.085em;
    line-height: 1;
    text-wrap: nowrap;
  }

  h1 .accent { color: var(--red); }

  .en-title {
    margin: 18px 0 0 4px;
    color: #8097aa;
    font-family: Arial, sans-serif;
    font-size: clamp(11px, 1.1vw, 18px);
    font-weight: 700;
    letter-spacing: .35em;
    line-height: 1.2;
    white-space: nowrap;
  }

  .description {
    max-width: 600px;
    margin: 28px 0 0 4px;
    color: #53718c;
    font-size: clamp(14px, 1.2vw, 19px);
    font-weight: 400;
    line-height: 1.7;
  }

  .description i {
    display: inline-block;
    width: 34px;
    height: 2px;
    margin: 0 12px 5px 0;
    vertical-align: middle;
    background: var(--red);
  }

  .art {
    position: absolute;
    z-index: 1;
    top: 0;
    right: clamp(-22px, 1.6vw, 28px);
    width: min(60%, 1060px);
    height: 100%;
    pointer-events: none;
  }

  .art svg { display: block; width: 100%; height: 100%; }

  .baseline {
    position: absolute;
    z-index: 2;
    right: 6.3%;
    bottom: 17.2%;
    width: min(45%, 812px);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(93, 161, 177, .68) 15%, rgba(93, 161, 177, .68) 85%, transparent);
  }

  @media (max-width: 780px) {
    .banner { min-height: 280px; }
    .content { align-items: flex-start; padding: 50px 28px; }
    .copy { width: 74%; }
    .art { width: 94%; right: -24%; opacity: .74; }
    h1 { font-size: clamp(43px, 13.5vw, 74px); }
    .en-title { margin-top: 13px; letter-spacing: .22em; font-size: 10px; }
    .description { margin-top: 19px; max-width: 360px; font-size: 13px; line-height: 1.55; }
    .description i { width: 24px; margin-right: 8px; }
    .baseline { right: -4%; width: 74%; bottom: 15%; }
  }

  @media (max-height: 350px) and (min-width: 781px) {
    .content { padding-top: 20px; padding-bottom: 20px; }
    .description { margin-top: 18px; }
    .en-title { margin-top: 12px; }
  }
</style>
</head>
<body>
  <main class="banner" aria-label="行业研究库">
    <div class="wash"></div>
    <div class="content">
      <section class="copy">
        <h1>行业研<span class="accent">究库</span></h1>
        <p class="en-title">INDUSTRY RESEARCH LIBRARY</p>
        <p class="description"><i></i>集中管理行业报告、区域专题、价格跟踪与政策信息。</p>

    </div>
  </main>
