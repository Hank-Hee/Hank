<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>行业研究库</title>
<style>
  :root {
    --navy: #0d2d4f;
    --ink: #183a5d;
    --red: #e73345;
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }

  body {
    color: var(--ink);
    background: #f8fcfd;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
  }

  .banner {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 330px;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(ellipse at 74% 57%, rgba(150, 220, 225, .36) 0%, rgba(218, 242, 244, .42) 26%, rgba(249, 253, 253, 0) 55%),
      linear-gradient(103deg, #ffffff 0%, #fbfdfd 38%, #edf9fa 100%);
  }

  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    opacity: .42;
    background-image:
      linear-gradient(rgba(127, 196, 204, .17) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127, 196, 204, .17) 1px, transparent 1px);
    background-size: 30px 30px;
    mask-image: linear-gradient(90deg, transparent 0%, transparent 40%, black 65%, transparent 100%);
  }

  .wash {
    position: absolute;
    inset: auto 0 0;
    z-index: -1;
    height: 38%;
    background: linear-gradient(180deg, transparent, rgba(187, 231, 234, .23));
  }

  .content {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    width: min(100%, 1780px);
    height: 100%;
    margin: 0 auto;
    padding: 34px clamp(38px, 7.4vw, 138px) 40px;
  }

  .copy {
    width: min(48vw, 750px);
    transform: translateY(-3px);
  }

  h1 {
    margin: 0;
    color: var(--navy);
    font-size: clamp(48px, 5.15vw, 88px);
    font-weight: 800;
    letter-spacing: .045em;
    line-height: 1;
    text-wrap: nowrap;
  }

  h1 .accent { color: var(--red); }

  .en-title {
    margin: 18px 0 0 4px;
    color: #8097aa;
    font-family: Arial, sans-serif;
    font-size: clamp(11px, 1.1vw, 18px);
    font-weight: 700;
    letter-spacing: .35em;
    line-height: 1.2;
    white-space: nowrap;
  }

  .description {
    max-width: 600px;
    margin: 28px 0 0 4px;
    color: #53718c;
    font-size: clamp(14px, 1.2vw, 19px);
    font-weight: 400;
    line-height: 1.7;
  }

  .description i {
    display: inline-block;
    width: 34px;
    height: 2px;
    margin: 0 12px 5px 0;
    vertical-align: middle;
    background: var(--red);
  }

  .art {
    position: absolute;
    z-index: 1;
    top: 0;
    right: clamp(-22px, 1.6vw, 28px);
    width: min(60%, 1060px);
    height: 100%;
    pointer-events: none;
  }

  .art svg { display: block; width: 100%; height: 100%; }

  @media (max-width: 780px) {
    .banner { min-height: 280px; }
    .content { align-items: flex-start; padding: 50px 28px; }
    .copy { width: 78%; }
    .art { width: 94%; right: -24%; opacity: .74; }
    h1 { font-size: clamp(43px, 13.5vw, 74px); letter-spacing: .03em; }
    .en-title { margin-top: 13px; letter-spacing: .22em; font-size: 10px; }
    .description { margin-top: 19px; max-width: 360px; font-size: 13px; line-height: 1.55; }
    .description i { width: 24px; margin-right: 8px; }
  }

  @media (max-height: 350px) and (min-width: 781px) {
    .content { padding-top: 20px; padding-bottom: 20px; }
    .description { margin-top: 18px; }
    .en-title { margin-top: 12px; }
  }
</style>
</head>
<body>
  <main class="banner" aria-label="行业研究库">
    <div class="wash"></div>
    <div class="content">
      <section class="copy">
        <h1>行业研<span class="accent">究库</span></h1>
        <p class="en-title">INDUSTRY RESEARCH LIBRARY</p>
        <p class="description"><i></i>集中管理行业报告、区域专题、价格跟踪与政策信息。</p>
      </section>
    </div>

    <div class="art" aria-hidden="true">
      <svg viewBox="0 0 1080 430" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="paperFill" x1="0" y1="0" x2="1" y2="1">
            <stop stop-color="#FFFFFF" stop-opacity=".96"/>
            <stop offset="1" stop-color="#EAF8F9" stop-opacity=".82"/>
          </linearGradient>
          <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#78B7C0" flood-opacity=".14"/>
          </filter>
          <pattern id="dots" width="15" height="15" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.1" fill="#76BEC7" fill-opacity=".42"/>
          </pattern>
        </defs>

        <ellipse cx="728" cy="221" rx="315" ry="148" fill="url(#dots)" opacity=".56"/>
        <ellipse cx="728" cy="221" rx="265" ry="124" stroke="#C1E4E7" stroke-width="1.2"/>
        <ellipse cx="728" cy="221" rx="188" ry="124" stroke="#D1ECEE" stroke-width="1"/>
        <path d="M463 221H993M488 177H968M488 265H968" stroke="#D0EBED" stroke-width="1"/>
        <path d="M554 109C600 181 600 261 554 333M902 109C856 181 856 261 902 333" stroke="#D0EBED" stroke-width="1"/>

        <g stroke-linecap="round">
          <path d="M515 282C568 238 618 297 670 252C722 207 788 197 849 228C892 250 933 226 976 186" stroke="#68BBC5" stroke-width="2" stroke-dasharray="3 10" opacity=".78"/>
          <circle cx="515" cy="282" r="4.5" fill="#FFF" stroke="#55B5BF" stroke-width="2"/>
          <circle cx="670" cy="252" r="4.5" fill="#FFF" stroke="#55B5BF" stroke-width="2"/>
          <circle cx="849" cy="228" r="4.5" fill="#FFF" stroke="#55B5BF" stroke-width="2"/>
          <circle cx="976" cy="186" r="4.5" fill="#FFF" stroke="#55B5BF" stroke-width="2"/>
        </g>

        <g filter="url(#shadow)">
          <rect x="514" y="131" width="166" height="116" rx="10" fill="#E6F6F7" stroke="#AFDCE0" stroke-width="1.7"/>
          <rect x="534" y="113" width="166" height="116" rx="10" fill="#F3FCFC" stroke="#93D0D6" stroke-width="1.7"/>
          <rect x="554" y="95" width="166" height="116" rx="10" fill="url(#paperFill)" stroke="#67BBC5" stroke-width="2"/>
          <path d="M580 128H665M580 148H644M580 168H655" stroke="#8CCBD1" stroke-width="3" stroke-linecap="round"/>
          <rect x="580" y="183" width="53" height="10" rx="5" fill="#C5EAEC"/>
          <circle cx="682" cy="185" r="10" fill="#E0F4F5" stroke="#8CCBD1" stroke-width="1.5"/>
          <path d="M677 185H687M682 180V190" stroke="#70BFC8" stroke-width="1.4" stroke-linecap="round"/>
        </g>

        <g filter="url(#shadow)">
          <rect x="741" y="151" width="154" height="106" rx="10" fill="url(#paperFill)" stroke="#72BFC8" stroke-width="2"/>
          <path d="M765 181H843M765 201H829M765 221H852" stroke="#91CBD1" stroke-width="3" stroke-linecap="round"/>
          <rect x="765" y="235" width="42" height="9" rx="4.5" fill="#C7EAEC"/>
          <path d="M858 222C867 208 877 218 886 198" stroke="#63B8C2" stroke-width="2" stroke-linecap="round"/>
          <circle cx="858" cy="222" r="3.5" fill="#FFF" stroke="#63B8C2" stroke-width="1.6"/>
          <circle cx="886" cy="198" r="3.5" fill="#FFF" stroke="#63B8C2" stroke-width="1.6"/>
        </g>

        <g opacity=".78">
          <path d="M455 310H669" stroke="#A5D9DD" stroke-width="1.4"/>
          <path d="M476 310V277M511 310V260M546 310V285M581 310V244M616 310V269M651 310V229" stroke="#8DCDD3" stroke-width="3" stroke-linecap="round"/>
          <path d="M473 277C510 276 522 257 546 284C571 312 592 239 618 268C637 289 647 236 666 228" stroke="#63B8C2" stroke-width="2.2"/>
          <circle cx="473" cy="277" r="3.5" fill="#FFF" stroke="#63B8C2" stroke-width="1.5"/>
          <circle cx="546" cy="284" r="3.5" fill="#FFF" stroke="#63B8C2" stroke-width="1.5"/>
          <circle cx="618" cy="268" r="3.5" fill="#FFF" stroke="#63B8C2" stroke-width="1.5"/>
          <circle cx="666" cy="228" r="3.5" fill="#FFF" stroke="#63B8C2" stroke-width="1.5"/>
        </g>

        <g opacity=".55">
          <circle cx="452" cy="174" r="4" fill="#6CBCC6"/>
          <circle cx="490" cy="144" r="3" fill="#87CDD3"/>
          <circle cx="876" cy="98" r="4" fill="#6CBCC6"/>
          <circle cx="948" cy="132" r="3" fill="#87CDD3"/>
          <circle cx="1010" cy="280" r="4" fill="#6CBCC6"/>
          <circle cx="424" cy="347" r="3" fill="#87CDD3"/>
        </g>
      </svg>
    </div>
  </main>
</body>
</html>
