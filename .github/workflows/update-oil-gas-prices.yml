name: Update oil and gas price data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 23 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest market data
        run: python scripts/update_oil_gas_data.py

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/oil-gas-prices.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/oil-gas-prices.json
          git commit -m "Update oil and gas price data"
          git push
